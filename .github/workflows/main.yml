name: Finalize Prices And Cost Basis

on:
  schedule:
    - cron: "35 6 * * 1-5"
  workflow_dispatch:
    inputs:
      through_date:
        description: "只補到此日期，格式 YYYY-MM-DD 或 YYYYMMDD"
        required: false
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  issues: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Taipei
      SHIOAJI_API_KEY: ${{ secrets.SHIOAJI_API_KEY }}
      SHIOAJI_SECRET_KEY: ${{ secrets.SHIOAJI_SECRET_KEY }}
      SHIOAJI_SIMULATION: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Determine through date
        shell: bash
        run: |
          RAW="${{ github.event.inputs.through_date }}"
          if [ -z "$RAW" ]; then
            THROUGH_DATE="$(date +'%Y-%m-%d')"
          elif [[ "$RAW" =~ ^[0-9]{8}$ ]]; then
            THROUGH_DATE="${RAW:0:4}-${RAW:4:2}-${RAW:6:2}"
          else
            THROUGH_DATE="$(date -d "$RAW" +'%Y-%m-%d')"
          fi
          echo "THROUGH_DATE=$THROUGH_DATE" >> "$GITHUB_ENV"
          echo "[workflow] THROUGH_DATE=$THROUGH_DATE"

      - name: Fill close prices via Shioaji
        run: |
          python scripts/fill_prices_with_shioaji.py \
            --through-date "$THROUGH_DATE" \
            --skip-complete \
            --strict \
            --write-with-price

      - name: Rebuild change tables
        run: |
          python scripts/build_change_tables.py \
            --through-date "$THROUGH_DATE" \
            --require-price

      - name: Rebuild cost basis
        run: python scripts/rebuild_cost_basis.py --reset

      - name: Determine latest finalized report date
        shell: bash
        run: |
          LATEST_REPORT="$(python - <<'PY'
          from pathlib import Path
          import pandas as pd

          latest = ""
          for path in sorted(Path("reports").glob("change_table_*.csv")):
              df = pd.read_csv(path, encoding="utf-8-sig", dtype=str)
              if "今日收盤價" not in df.columns:
                  continue
              prices = pd.to_numeric(df["今日收盤價"], errors="coerce")
              changes = pd.to_numeric(df.get("買賣超股數"), errors="coerce").fillna(0)
              first_buys = df.get("首次買進")
              if first_buys is None:
                  mask = changes.ne(0)
              else:
                  mask = changes.ne(0) | first_buys.astype(str).str.lower().eq("true")
              if mask.any() and not prices[mask].notna().all():
                  continue
              latest = path.stem.replace("change_table_", "")
          print(latest)
          PY
          )"
          if [ -z "$LATEST_REPORT" ]; then
            echo "No finalized report found."
            exit 1
          fi
          echo "REPORT_DATE=$LATEST_REPORT" >> "$GITHUB_ENV"
          echo "[workflow] REPORT_DATE=$LATEST_REPORT"

      - name: Generate charts
        run: python charts.py

      - name: Commit finalized outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ prices/ reports/ charts/ manifest/ archive/
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "Finalize prices & cost basis: ${REPORT_DATE}"
            git pull --rebase origin master
            git push
          fi

      - name: Notify failure
        if: failure()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        run: |
          BODY=$(cat <<EOF
          workflow: Finalize Prices And Cost Basis
          job: finalize
          through_date: ${THROUGH_DATE:-N/A}
          ref: ${{ github.ref_name }}
          run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF
          )
          python scripts/notify_failure.py \
            --subject "[00992A] Finalize prices or cost basis failed" \
            --body "$BODY"
