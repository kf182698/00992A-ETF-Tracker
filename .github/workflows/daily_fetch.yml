name: Daily Fetch Holdings

on:
  schedule:
    - cron: "10 9 * * 1-5"
  workflow_dispatch:
    inputs:
      report_date:
        description: "指定查詢日期，格式 YYYY-MM-DD 或 YYYYMMDD"
        required: false
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  issues: write

jobs:
  fetch-holdings:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Taipei
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Determine requested report date
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.report_date }}" ]; then
            RAW="${{ github.event.inputs.report_date }}"
          else
            DOW=$(date +%u)
            if [ "$DOW" -eq 1 ]; then OFF=3; else OFF=1; fi
            RAW="$(date -d "-${OFF} day" +'%Y-%m-%d')"
          fi
          if [[ "$RAW" =~ ^[0-9]{8}$ ]]; then
            REPORT_DATE="${RAW:0:4}-${RAW:4:2}-${RAW:6:2}"
          else
            REPORT_DATE="$(date -d "$RAW" +'%Y-%m-%d')"
          fi
          echo "REPORT_DATE=$REPORT_DATE" >> "$GITHUB_ENV"
          echo "[workflow] requested REPORT_DATE=$REPORT_DATE"

      - name: Fetch latest holdings snapshot
        run: python fetch_snapshot.py

      - name: Commit holdings update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add archive/ data/ manifest/
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            EFFECTIVE_DATE="$(cat manifest/effective_date.txt)"
            git commit -m "Daily holdings update: ${EFFECTIVE_DATE}"
            git pull --rebase origin master
            git push
          fi

      - name: Notify failure
        if: failure()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        run: |
          BODY=$(cat <<EOF
          workflow: Daily Fetch Holdings
          job: fetch-holdings
          requested_report_date: ${REPORT_DATE:-N/A}
          ref: ${{ github.ref_name }}
          run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF
          )
          python scripts/notify_failure.py \
            --subject "[00992A] Daily holdings fetch failed" \
            --body "$BODY"
