name: Repair Prices And Reports

on:
  workflow_dispatch:
    inputs:
      through_date:
        description: "重補到此日期，格式 YYYY-MM-DD 或 YYYYMMDD"
        required: false
        default: ""

permissions:
  contents: write
  issues: write

jobs:
  repair:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Taipei
      SHIOAJI_API_KEY: ${{ secrets.SHIOAJI_API_KEY }}
      SHIOAJI_SECRET_KEY: ${{ secrets.SHIOAJI_SECRET_KEY }}
      SHIOAJI_SIMULATION: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Determine through date
        shell: bash
        run: |
          RAW="${{ github.event.inputs.through_date }}"
          if [ -z "$RAW" ]; then
            THROUGH_DATE="$(date +'%Y-%m-%d')"
          elif [[ "$RAW" =~ ^[0-9]{8}$ ]]; then
            THROUGH_DATE="${RAW:0:4}-${RAW:4:2}-${RAW:6:2}"
          else
            THROUGH_DATE="$(date -d "$RAW" +'%Y-%m-%d')"
          fi
          echo "THROUGH_DATE=$THROUGH_DATE" >> "$GITHUB_ENV"
          echo "[workflow] THROUGH_DATE=$THROUGH_DATE"

      - name: Repair prices via Shioaji
        run: |
          python scripts/fill_prices_with_shioaji.py \
            --through-date "$THROUGH_DATE" \
            --write-with-price

      - name: Rebuild reports and cost basis
        run: |
          python scripts/build_change_tables.py \
            --through-date "$THROUGH_DATE" \
            --require-price
          python scripts/rebuild_cost_basis.py --reset

      - name: Commit repaired outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ prices/ reports/ manifest/
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "Repair prices & reports through ${THROUGH_DATE}"
            git pull --rebase origin master
            git push
          fi

      - name: Notify failure
        if: failure()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        run: |
          BODY=$(cat <<EOF
          workflow: Repair Prices And Reports
          job: repair
          through_date: ${THROUGH_DATE:-N/A}
          ref: ${{ github.ref_name }}
          run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF
          )
          python scripts/notify_failure.py \
            --subject "[00992A] Repair prices or reports failed" \
            --body "$BODY"
