name: Rebuild Cost Basis

on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  rebuild-cost-basis:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Taipei
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Rebuild cost basis from reports
        run: python scripts/rebuild_cost_basis.py --reset

      - name: Commit rebuilt cost basis
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/cost_basis.csv data/realized_gains_log.csv
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "Rebuild cost basis"
            git pull --rebase origin master
            git push
          fi

      - name: Notify failure
        if: failure()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        run: |
          BODY=$(cat <<EOF
          workflow: Rebuild Cost Basis
          job: rebuild-cost-basis
          ref: ${{ github.ref_name }}
          run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF
          )
          python scripts/notify_failure.py \
            --subject "[00992A] Rebuild cost basis failed" \
            --body "$BODY"
